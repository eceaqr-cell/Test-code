<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth System (Demo)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-purple-50 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Brand Logo -->
        <div class="text-center mb-6">
            <div class="bg-gradient-to-r from-blue-600 to-purple-600 rounded-full w-16 h-16 flex items-center justify-center mx-auto mb-2 shadow-lg">
                <i data-lucide="fingerprint" class="w-8 h-8 text-white"></i>
            </div>
        </div>

        <!-- ១. ប្រអប់ LOGIN CARD -->
        <div id="loginCard" class="bg-white/80 backdrop-blur-lg rounded-2xl shadow-2xl p-8 space-y-6">
            <div class="text-center">
                <h2 class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">Welcome Back</h2>
                <p class="text-gray-500 mt-2">Sign in to your account</p>
            </div>

            <form id="loginForm" action="../index.html" class="space-y-4">
                <div>
                    <label class="block text-gray-700 text-sm font-medium mb-1">Email</label>
                    <input type="email" id="loginEmail" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 bg-white/50" required placeholder="name@email.com">
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-medium mb-1">Password</label>
                    <input type="password" id="loginPassword" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 bg-white/50" required placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 rounded-xl font-medium shadow-lg hover:opacity-90 transition">Sign In
                </button>
                
            </form>
            <p class="text-center text-sm text-gray-600">
                Don't have an account? <button onclick="toggleCard('register')" class="text-blue-600 font-semibold hover:underline">Sign up</button>
            </p>
        </div>

        <!-- ២. ប្រអប់ REGISTER CARD (លាក់ទុកសិន) -->
        <div id="registerCard" class="bg-white/80 backdrop-blur-lg rounded-2xl shadow-2xl p-8 space-y-6 hidden">
            <div class="text-center">
                <h2 class="text-3xl font-bold bg-gradient-to-r from-purple-600 to-blue-600 bg-clip-text text-transparent">Create Account</h2>
                <p class="text-gray-500 mt-2">Sign up for a new account</p>
            </div>

            <form id="registerForm" action="../index.html" class="space-y-4">
                <div>
                    <label class="block text-gray-700 text-sm font-medium mb-1">Email Address</label>
                    <input type="email" id="regEmail" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-purple-500 bg-white/50" required placeholder="name@email.com">
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-medium mb-1">Password</label>
                    <input type="password" id="regPassword" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-purple-500 bg-white/50" required placeholder="Minimum 6 characters">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white py-3 rounded-xl font-medium shadow-lg hover:opacity-90 transition">Register Now</button>
            </form>
            <p class="text-center text-sm text-gray-600">
                Already have an account? <button onclick="toggleCard('login')" class="text-blue-600 font-semibold hover:underline">Sign in</button>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // មុខងារប្តូរផ្ទាំងរវាង Login និង Register
        function toggleCard(type) {
            if(type === 'register') {
                document.getElementById('loginCard').classList.add('hidden');
                document.getElementById('registerCard').classList.remove('hidden');
            } else {
                document.getElementById('registerCard').classList.add('hidden');
                document.getElementById('loginCard').classList.remove('hidden');
            }
        }

        // === ប្រព័ន្ធបង្កើតអាខោន (REGISTER) ===
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            // បង្កើត Object គណនីថ្មី
            const newUser = { email: email, password: password };

            // រក្សាទុកចូល LocalStorage (ប្រៀបដូច Database ក្នុង Browser)
            localStorage.setItem('userAccount', JSON.stringify(newUser));

            alert('🎉 បង្កើតគណនីជោគជ័យហើយ! លោកអ្នកអាចសាកល្បង Login បាន។');
            document.getElementById('registerForm').reset();
            toggleCard('login'); // ប្តូរទៅផ្ទាំង Login វិញ
        });

        // === ប្រព័ន្ធចូលប្រើប្រាស់ (LOGIN) ===
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            // ទាញយកទិន្នន័យដែលបានចុះឈ្មោះពី LocalStorage មកផ្ទៀងផ្ទាត់
            const savedUser = JSON.stringify(localStorage.getItem('userAccount'));
            const userData = JSON.parse(localStorage.getItem('userAccount'));

            if (userData && userData.email === email && userData.password === password) {
                alert('✅ ស្វាគមន៍មកកាន់ប្រព័ន្ធ! អ្នកបានចូលប្រើប្រាស់ជោគជ័យ។');
                // ត្រង់នេះ បងអាចឱ្យវាលោតទៅទំព័រផ្សេងបាន ឧទាហរណ៍៖
                // window.location.href = 'dashboard.html';
            } else {
                alert('❌ អ៊ីមែល ឬ លេខសម្ងាត់មិនត្រឹមត្រូវទេ! (ឬបងមិនទាន់បានចុះឈ្មោះ)');
            }
        });
    </script>
</body>
</html>
